server:
  # Caddy(HTTPS 종단) 뒤에서 X-Forwarded-* 헤더를 신뢰 → https 스킴 인식(Swagger가 https로 요청)
  forward-headers-strategy: framework

spring:
  application:
    name: Rodi
  profiles:
    default: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    baseline-on-migrate: true   # PostGIS 기본 객체(spatial_ref_sys 등)로 스키마가 비어있지 않아 필요
    baseline-version: 0         # 기본값 1이면 V1이 스킵됨 → 0으로 낮춰 V1부터 적용

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"   # 모든 로그 줄에 요청별 traceId 표시

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}   # 미설정 시 알림 전송 안 함(로컬 등)

management:
  endpoints:
    web:
      exposure:
        include: health          # 헬스체크만 노출(운영 정보 보호)
  endpoint:
    health:
      show-details: when-authorized   # 상세는 인증 시에만

jwt:
  secret: ${JWT_SECRET}   # 환경변수로만 주입(기본값 없음)
  access-token-ttl: 30m
  refresh-token-ttl: 14d

oauth:
  kakao:
    user-info-uri: https://kapi.kakao.com/v2/user/me   # accessToken 검증 방식(코드 교환 X)
  apple:
    issuer: https://appleid.apple.com
    token-uri: https://appleid.apple.com/auth/token
    jwks-uri: https://appleid.apple.com/auth/keys
    team-id: ${APPLE_TEAM_ID:}          # env 주입(미설정 시 애플 로그인만 불가, 앱 기동은 정상)
    key-id: ${APPLE_KEY_ID:}
    client-id: ${APPLE_CLIENT_ID:}      # Bundle ID
    private-key: ${APPLE_PRIVATE_KEY:}  # .p8 내용(시크릿)
