services:
  db:
    image: imresamu/postgis:16-3.4
    container_name: rodi-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rodi}
      POSTGRES_USER: ${POSTGRES_USER:-rodi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD를 .env에 설정하세요}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rodi-pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rodi} -d ${POSTGRES_DB:-rodi}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rodi-pgdata:
