version: 2
updates:
  # Gradle 의존성
  - package-ecosystem: "gradle"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      gradle:
        patterns: ["*"]   # 모든 gradle 업데이트를 PR 1개로 묶음
    commit-message:
      prefix: "chore"     # 커밋 컨벤션(build 아님)
    labels: ["dependencies"]

  # GitHub Actions 워크플로 액션 버전
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
    labels: ["dependencies", "ci"]

  # Dockerfile 베이스 이미지
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    groups:
      docker:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
    labels: ["dependencies", "docker"]
