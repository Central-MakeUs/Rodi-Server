name: CI

# PR 시 빌드 + 테스트 (Testcontainers는 러너에 내장된 Docker로 동작)
on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build & Test
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon
