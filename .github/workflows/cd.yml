name: CD

# main push 시: 테스트 → 이미지 빌드/GHCR push → Lightsail 배포
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # 수동 재배포/롤백용

concurrency:
  group: cd-main
  cancel-in-progress: false   # 배포는 중간에 취소하지 않음

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Test
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon
      - name: SonarCloud 분석 (main)
        if: env.SONAR_TOKEN != ''
        run: ./gradlew sonar --no-daemon

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # GHCR push
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 최신 compose·Caddy 설정을 서버로 전송 (deploy/ 접두어 제거하고 /opt/rodi 에 배치)
      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "deploy/compose.prod.yaml,deploy/Caddyfile"
          target: "/opt/rodi"
          strip_components: 1

      # 배포 중 잠깐의 다운으로 UptimeRobot이 오탐하지 않도록 모니터를 일시정지
      - name: Pause UptimeRobot
        env:
          API_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
          MONITOR_ID: ${{ secrets.UPTIMEROBOT_MONITOR_ID }}
        run: |
          [ -z "$API_KEY" ] && { echo "UPTIMEROBOT_API_KEY 미설정 — pause 스킵"; exit 0; }
          curl -s -X POST https://api.uptimerobot.com/v2/editMonitor \
            -d "api_key=$API_KEY" -d "id=$MONITOR_ID" -d "status=0" > /dev/null

      # 이번 커밋 SHA 태그 이미지를 pull 후 재기동
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/rodi
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f compose.prod.yaml pull
            docker compose -f compose.prod.yaml up -d
            docker image prune -f

      # 앱이 정상 기동(health 200)한 뒤 모니터 재개 — 부팅 전 재개 시 오탐 방지. 배포 실패해도 재개.
      - name: Wait for health then resume UptimeRobot
        if: always()
        env:
          API_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
          MONITOR_ID: ${{ secrets.UPTIMEROBOT_MONITOR_ID }}
        run: |
          [ -z "$API_KEY" ] && { echo "UPTIMEROBOT_API_KEY 미설정 — resume 스킵"; exit 0; }
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://api.stillstar.store/actuator/health || true)
            echo "health check[$i]: $code"
            [ "$code" = "200" ] && break
            sleep 6
          done
          curl -s -X POST https://api.uptimerobot.com/v2/editMonitor \
            -d "api_key=$API_KEY" -d "id=$MONITOR_ID" -d "status=1" > /dev/null
