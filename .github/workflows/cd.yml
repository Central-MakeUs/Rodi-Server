name: CD

# main·develop push 시: 테스트 → 이미지 빌드/GHCR push → Lightsail 단일 app 재배포
# (별도 스테이징 없음 — 서버 메모리 제약. 어느 브랜치를 push하든 같은 app에 배포되며 나중 push가 반영됨)
on:
  push:
    branches: [main, develop]
  workflow_dispatch: {}   # 수동 재배포/롤백용

concurrency:
  group: cd-deploy          # main·develop 배포를 한 그룹으로 직렬화(같은 app을 동시에 안 건드리게)
  cancel-in-progress: false   # 배포는 중간에 취소하지 않음

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Test
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # GHCR push
    steps:
      - uses: actions/checkout@v7

      - name: Set lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          # :sha 는 배포에 사용, :브랜치명(main/develop)은 이동 태그로 편의 제공
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.sha }}
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # 최신 compose·Caddy 설정을 서버로 전송 (deploy/ 접두어 제거하고 /opt/rodi 에 배치)
      - name: Copy deploy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "deploy/compose.prod.yaml,deploy/Caddyfile"
          target: "/opt/rodi"
          strip_components: 1

      # 이번 SHA 이미지로 app 을 pull·재기동
      # 배포 메타데이터(브랜치·커밋·커밋메시지·레포)는 스크립트에 직접 넣지 않고 envs로 전달(주입 안전)
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_COMMIT: ${{ github.sha }}
          DEPLOY_MESSAGE: ${{ github.event.head_commit.message }}
          DEPLOY_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          envs: DEPLOY_BRANCH,DEPLOY_COMMIT,DEPLOY_MESSAGE,DEPLOY_REPO
          script: |
            cd /opt/rodi
            export IMAGE_TAG=${{ github.sha }}
            # 기동 알림용 메타데이터를 컨테이너로 전달 (커밋 메시지는 제목 한 줄만)
            export DEPLOY_BRANCH DEPLOY_COMMIT DEPLOY_REPO
            export DEPLOY_MESSAGE="$(printf '%s' "$DEPLOY_MESSAGE" | head -n1)"
            docker compose -f compose.prod.yaml pull app
            docker compose -f compose.prod.yaml up -d app
            docker image prune -f
